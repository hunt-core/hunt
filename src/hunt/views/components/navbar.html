<nav class="bg-white border-b border-gray-200 px-4 py-3">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
        <a href="{{ brand_url|default('/') }}" class="text-lg font-bold text-gray-900">
            {{- brand|default('') -}}
        </a>
        <div class="flex items-center gap-6">
            {%- for link in links|default([]) %}
            <a href="{{ link.url }}"
               class="text-sm font-medium {% if link.get('active', false) %}text-blue-600{% else %}text-gray-600 hover:text-gray-900{% endif %} transition-colors">
                {{- link.label -}}
            </a>
            {%- endfor %}
            {{- _slot_default|default('')|safe }}
        </div>
    </div>
</nav>
