<dialog id="{{ id|default('modal') }}"
        class="rounded-xl shadow-2xl p-0 max-w-lg w-full border-0 backdrop:bg-black/50 backdrop:backdrop-blur-sm">
    <div class="flex items-center justify-between px-6 py-4 border-b">
        <h3 class="text-base font-semibold text-gray-900">{{ title|default('') }}</h3>
        <button type="button"
                onclick="document.getElementById('{{ id|default('modal') }}').close()"
                class="text-gray-400 hover:text-gray-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <div class="px-6 py-4 text-sm text-gray-700">
        {{- _slot_default|default('')|safe }}
    </div>
    {%- if _slot_footer is defined and _slot_footer %}
    <div class="px-6 py-4 border-t bg-gray-50 rounded-b-xl flex items-center justify-end gap-2">
        {{- _slot_footer|safe }}
    </div>
    {%- endif %}
</dialog>
