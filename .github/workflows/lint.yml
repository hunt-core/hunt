name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install ruff
        run: uv tool install ruff

      - name: Lint
        run: uv tool run ruff check src/

      - name: Format
        run: uv tool run ruff format --check src/
